name: .NET Core Advanced DevSecOps Quality Gate
# La pipeline si attiva solo quando viene aperta o aggiornata una Pull Request verso main
on:
  pull_request:
    branches: [ "main" ]
jobs:
  # JOB 1: Compilazione formale (Fail-Fast: blocca subito se il codice non compila)
  build:
    name: Build & Restore .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # Imposta la versione SDK corretta per i ragazzi
      - name: Restore Dependencies
        run: dotnet restore
      - name: Build Project
        run: dotnet build --no-restore --configuration Release
  # JOB 2: Analisi SAST con Taint Analysis corretta per C#
  semgrep-sast:
    name: Semgrep Custom Taint Scan
    runs-on: ubuntu-latest
    needs: build # Viene eseguito solo se la build ha avuto successo (risparmio di risorse/Muda)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Generazione automatica del file di regole personalizzato sul runner
      - name: Create Custom C# Taint Rule
        run: |
          mkdir -p .semgrep
          cat << 'EOF' > .semgrep/csharp-taint-rules.yml
          rules:
            - id: csharp-ef-sqli-taint-tracking
              languages:
                - csharp
              severity: ERROR
              message: "Quality Gate Fallito: Rilevata potenziale SQL Injection in Entity Framework Core. Una stringa di input utente non sanificata ($INPUT) fluisce direttamente all'interno di una query ExecuteSqlRaw non parametrizzata."
              
              # Attivazione della Taint Analysis (analisi del flusso dati)
              mode: taint
              # Sorgente (Source): Parametro stringa in ingresso nei Controller ASP.NET Core (Risolto sintatticamente)
              pattern-sources:
                - patterns:
                    # Definiamo il contesto del Controller e del metodo recuperando correttamente il tipo di ritorno $TYPE
                    - pattern-inside: |
                        public class $CONTROLLER : $BASE {
                            ...
                            public $TYPE $ACTION(..., string $INPUT, ...) {
                                ...
                            }
                        }
                    # Filtriamo solo le classi che ereditano dai controller nativi ASP.NET
                    - metavariable-regex:
                        metavariable: $BASE
                        regex: ^(Controller|ControllerBase)$
                    # La sorgente effettiva del Taint è la variabile di input $INPUT
                    - pattern: $INPUT
              # Destinazione sensibile (Sink): Concatenazione e passaggio a ExecuteSqlRaw
              pattern-sinks:
                - patterns:
                    - pattern: $CONTEXT.Database.ExecuteSqlRaw($SQL, ...)
                    - pattern-either:
                        - pattern: |
                            $SQL = $X + $INPUT + $Y
                        - pattern: |
                            $SQL = $"...{$INPUT}..."
                    - focus-metavariable: $SQL
              # Funzioni di bonifica (Sanitizers): Metodi sicuri di conversione tipo
              pattern-sanitizers:
                - pattern-either:
                    - pattern: int.Parse(...)
                    - pattern: Convert.ToInt32(...)
                    - pattern: Convert.ToInt64(...)
          EOF
      # Esecuzione del container ufficiale di Semgrep utilizzando la regola appena creata
      - name: Run Semgrep SAST
        run: |
          # --error forza Semgrep a restituire 'exit code 1' se rileva la vulnerabilità, bloccando la pipeline
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep semgrep scan --config=/src/.semgrep/csharp-taint-rules.yml --error