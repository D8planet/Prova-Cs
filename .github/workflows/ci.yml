name: .NET Core Advanced DevSecOps Quality Gate
on:
  pull_request:
    branches: [ "main" ]
jobs:
  # Job 1: Compilazione (Fail-Fast per verificare l'integrità del codice)
  build:
    name: Build & Restore .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Restore Dependencies
        run: dotnet restore
      - name: Build Project
        run: dotnet build --no-restore --configuration Release
  # Job 2: Analisi SAST con Taint Analysis personalizzata
  semgrep-sast:
    name: Semgrep Custom Taint Scan
    runs-on: ubuntu-latest
    needs: build # Parte solo se il codice compila con successo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Generazione della regola di Taint Analysis specifica per C# e Entity Framework Core
      - name: Create Custom C# Taint Rule
        run: |
          mkdir -p .semgrep
          cat << 'EOF' > .semgrep/csharp-taint-rules.yml
          rules:
            - id: csharp-ef-sqli-taint-tracking
              languages:
                - csharp
              severity: ERROR
              message: "Quality Gate Fallito: Rilevata potenziale SQL Injection in Entity Framework Core. Una stringa di input utente non sanificata ($INPUT) fluisce direttamente all'interno di una query ExecuteSqlRaw non parametrizzata."
              
              # Attivazione della Taint Analysis (tracciamento del flusso dati)
              mode: taint
              # Sorgente (Source): Parametri stringa in ingresso nei Controller ASP.NET Core
              pattern-sources:
                - patterns:
                    - pattern-inside: |
                        public class $CONTROLLER : Controller { ... }
                    - pattern-either:
                        - pattern: |
                            public $ACTION(..., string $INPUT, ...) { ... }
              # Destinazione sensibile (Sink): Esecuzione di SQL dinamico tramite ExecuteSqlRaw
              pattern-sinks:
                - patterns:
                    - pattern: $CONTEXT.Database.ExecuteSqlRaw($SQL, ...)
                    - pattern-either:
                        - pattern: |
                            $SQL = $X + $INPUT + $Y
                        - pattern: |
                            $SQL = $"...{$INPUT}..."
                    - focus-metavariable: $SQL
              # Funzioni di bonifica (Sanitizers): Metodi che convertono in tipi sicuri o sanificano
              pattern-sanitizers:
                - pattern-either:
                    - pattern: int.Parse(...)
                    - pattern: Convert.ToInt32(...)
          EOF
      # Esecuzione di Semgrep
      - name: Run Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep semgrep scan --config=/src/.semgrep/csharp-taint-rules.yml --error
 